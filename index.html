<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14264d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>経営者への道</title>
<style>
:root{
  --navy:#14264d; --navy2:#1e3566; --navy3:#2a4680;
  --gold:#d4af37; --gold2:#f0c650; --gold-soft:#f7e7a8;
  --bg:#eef2f8; --card:#ffffff; --ink:#1f2a44; --sub:#6b7891;
  --line:#e2e8f2; --ok:#1a9e6c; --ng:#d64545;
  --n:#9aa5b1; --r:#3b82f6; --sr:#d4af37;
  --shadow:0 4px 16px rgba(20,38,77,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Segoe UI",sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.55;
  overscroll-behavior-y:none;
}
#app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:76px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{font-family:inherit;font-size:16px;}
h1,h2,h3,h4{margin:0;}
.hidden{display:none !important;}

/* ===== Top bar ===== */
.topbar{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  color:#fff;padding:14px 16px calc(14px + env(safe-area-inset-top,0));
  padding-top:calc(14px + env(safe-area-inset-top,0));
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 10px rgba(20,38,77,.25);
}
.topbar .tb-title{font-size:17px;font-weight:800;letter-spacing:.02em;}
.topbar .tb-sub{font-size:11px;color:var(--gold-soft);font-weight:600;}
.tb-badge{background:rgba(255,255,255,.12);border:1px solid rgba(212,175,55,.5);
  color:var(--gold2);font-weight:800;font-size:12px;padding:4px 10px;border-radius:999px;}

/* ===== Screen ===== */
.screen{padding:16px 16px 8px;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px;}
.card h3{font-size:14px;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.muted{color:var(--sub);font-size:13px;}
.row{display:flex;align-items:center;gap:10px;}
.spacer{flex:1;}

/* ===== Home hero ===== */
.hero{
  background:linear-gradient(160deg,var(--navy),var(--navy2) 70%,var(--navy3));
  color:#fff;border-radius:20px;padding:20px 18px;text-align:center;position:relative;overflow:hidden;
  box-shadow:0 8px 24px rgba(20,38,77,.28);margin-bottom:14px;
}
.hero:before{content:"";position:absolute;inset:0;background:
  radial-gradient(120px 120px at 85% 10%,rgba(212,175,55,.22),transparent 70%);}
.hero .company-name{font-size:20px;font-weight:800;letter-spacing:.02em;position:relative;}
.hero .stage-name{font-size:12px;color:var(--gold2);font-weight:700;margin-top:2px;position:relative;}
.hero .building{font-size:64px;line-height:1;margin:10px 0 6px;position:relative;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.3));animation:float 3.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.hero .rank-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;position:relative;margin-top:6px;}
.chip{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);
  border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;}
.chip.gold{border-color:rgba(212,175,55,.6);color:var(--gold2);}
.hero .xp-total{font-size:13px;margin-top:10px;position:relative;}
.hero .xp-total b{color:var(--gold2);font-size:18px;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat{background:var(--card);border-radius:14px;padding:12px;box-shadow:var(--shadow);}
.stat .k{font-size:11px;color:var(--sub);font-weight:700;}
.stat .v{font-size:16px;font-weight:800;color:var(--navy);margin-top:2px;}

/* ===== Dept bars ===== */
.dept{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.dept:last-child{margin-bottom:0;}
.dept .emo{font-size:26px;width:34px;text-align:center;flex:none;}
.dept .body{flex:1;min-width:0;}
.dept .top{display:flex;justify-content:space-between;font-size:12px;font-weight:700;}
.dept .top .lv{color:var(--gold);}
.bar{height:9px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:5px;}
.bar>span{display:block;height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .6s ease;}
.dept .decor{font-size:12px;margin-top:2px;letter-spacing:2px;min-height:14px;}

/* ===== mission ===== */
.mission{display:flex;gap:10px;}
.mission .m{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:10px;text-align:center;}
.mission .m.done{border-color:var(--ok);background:#eafaf3;}
.mission .m .ic{font-size:22px;}
.mission .m .t{font-size:12px;font-weight:700;margin-top:2px;}
.mission .m .s{font-size:11px;color:var(--sub);}
.mission .m.done .s{color:var(--ok);font-weight:700;}

/* ===== buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:var(--navy);color:#fff;font-weight:800;font-size:15px;
  padding:13px 18px;border-radius:13px;width:100%;box-shadow:var(--shadow);
  transition:transform .08s ease,opacity .2s;}
.btn:active{transform:scale(.97);}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);}
.btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line);box-shadow:none;}
.btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px;}
.btn:disabled{opacity:.45;cursor:default;}
.btn.danger{background:var(--ng);}

/* ===== choices ===== */
.choices{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.choice{text-align:left;border:1.5px solid var(--line);background:#fff;border-radius:12px;
  padding:13px 14px;font-size:14px;font-weight:600;transition:.15s;display:flex;gap:10px;align-items:flex-start;}
.choice .lab{font-weight:800;color:var(--navy2);flex:none;}
.choice:active{transform:scale(.99);}
.choice.correct{border-color:var(--ok);background:#eafaf3;}
.choice.wrong{border-color:var(--ng);background:#fdeaea;}
.choice.dim{opacity:.5;}
.explain{margin-top:12px;padding:12px;border-radius:12px;background:#f3f6fc;font-size:13px;border-left:4px solid var(--navy2);}
.explain.ok{border-color:var(--ok);}
.explain.ng{border-color:var(--ng);}
.explain b{color:var(--navy);}

/* ===== dept picker ===== */
.dept-pick{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dept-pick button{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px 8px;
  text-align:center;box-shadow:var(--shadow);}
.dept-pick button .e{font-size:30px;}
.dept-pick button .n{font-size:13px;font-weight:800;margin-top:4px;color:var(--navy);}
.dept-pick button .lv{font-size:11px;color:var(--gold);font-weight:700;}

/* ===== progress dots ===== */
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--sub);font-weight:700;margin-bottom:8px;}
.dots{display:flex;gap:4px;}
.dots i{width:8px;height:8px;border-radius:99px;background:var(--line);}
.dots i.on{background:var(--gold);}
.dots i.now{background:var(--navy);}

/* ===== list rows (bosses/quests) ===== */
.lrow{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;padding:13px 14px;
  box-shadow:var(--shadow);margin-bottom:10px;width:100%;text-align:left;}
.lrow .ic{font-size:24px;flex:none;}
.lrow .body{flex:1;min-width:0;}
.lrow .body .t{font-size:14px;font-weight:800;color:var(--navy);}
.lrow .body .s{font-size:12px;color:var(--sub);}
.lrow .done-mark{color:var(--ok);font-weight:800;font-size:13px;flex:none;}
.stars{color:var(--gold);font-size:12px;letter-spacing:1px;}
.sec-title{font-size:13px;font-weight:800;color:var(--navy);margin:18px 2px 8px;display:flex;align-items:center;gap:6px;}

/* ===== detail ===== */
.back{display:inline-flex;align-items:center;gap:4px;color:var(--navy2);font-weight:800;font-size:14px;margin-bottom:10px;}
.qbox{background:var(--navy);color:#fff;border-radius:14px;padding:14px;font-size:14px;font-weight:600;margin-bottom:14px;line-height:1.6;}
.step{border:1.5px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;background:#fff;}
.step summary{padding:11px 13px;font-weight:800;font-size:13px;color:var(--navy);cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px;}
.step summary::-webkit-details-marker{display:none;}
.step[open] summary{border-bottom:1px solid var(--line);}
.step .hint{padding:11px 13px;font-size:13px;color:var(--sub);background:#f7f9fd;}
.field{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px;font-size:15px;margin-top:6px;resize:vertical;min-height:64px;background:#fff;}
.numfield{width:100%;border:1.5px solid var(--navy2);border-radius:11px;padding:12px;font-size:17px;font-weight:800;text-align:center;margin-top:8px;}
.model{background:#f3f6fc;border-radius:12px;padding:14px;font-size:13px;margin-top:12px;border-left:4px solid var(--gold);}
.model h4{font-size:13px;color:var(--navy);margin-bottom:6px;}
.model ul{margin:6px 0;padding-left:18px;}
.model .res{font-weight:800;color:var(--navy);font-size:15px;margin-top:6px;}
.check{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border:1.5px solid var(--line);
  border-radius:12px;margin-bottom:8px;background:#fff;font-size:13px;font-weight:600;}
.check.on{border-color:var(--ok);background:#eafaf3;}
.check .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--sub);flex:none;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:900;}
.check.on .box{background:var(--ok);border-color:var(--ok);}
.tag{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;
  background:var(--navy2);color:#fff;margin-bottom:6px;}

/* ===== dex ===== */
.dexbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.dexbar .prog{flex:1;font-size:13px;font-weight:800;color:var(--navy);}
.dexgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.dcard{aspect-ratio:3/4;border-radius:12px;padding:7px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;border:2px solid var(--n);background:#fff;box-shadow:var(--shadow);}
.dcard.r{border-color:var(--r);}
.dcard.sr{border-color:var(--sr);box-shadow:0 0 0 1px var(--sr),0 4px 12px rgba(212,175,55,.35);}
.dcard.ssr{border-color:transparent;background:
  linear-gradient(#fff,#fff) padding-box,
  linear-gradient(135deg,#ff5f6d,#ffc371,#5eead4,#818cf8,#f472b6) border-box;
  box-shadow:0 4px 14px rgba(129,140,248,.4);}
.dcard .rr{position:absolute;top:5px;left:5px;font-size:9px;font-weight:900;padding:1px 5px;border-radius:5px;
  background:var(--n);color:#fff;}
.dcard.r .rr{background:var(--r);}
.dcard.sr .rr{background:var(--sr);}
.dcard.ssr .rr{background:linear-gradient(135deg,#ff5f6d,#818cf8);}
.dcard .cco{font-size:9px;color:var(--sub);font-weight:700;}
.dcard .cti{font-size:11px;font-weight:800;color:var(--navy);line-height:1.25;}
.dcard.locked{background:#eef1f6;border-color:#dbe1ec !important;box-shadow:none;align-items:center;justify-content:center;}
.dcard.locked .q{font-size:30px;color:#c2cadb;font-weight:900;}
.dcard .catemo{position:absolute;top:4px;right:5px;font-size:14px;}

/* ===== nav ===== */
.nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;
  background:#fff;border-top:1px solid var(--line);display:flex;z-index:30;
  padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -2px 12px rgba(20,38,77,.06);}
.nav button{flex:1;padding:8px 0 6px;text-align:center;color:var(--sub);font-size:10px;font-weight:700;}
.nav button .ni{font-size:22px;display:block;line-height:1.1;filter:grayscale(.4);opacity:.75;}
.nav button.on{color:var(--navy);}
.nav button.on .ni{filter:none;opacity:1;transform:translateY(-1px);}

/* ===== toast ===== */
#toasts{position:fixed;left:0;right:0;bottom:88px;max-width:520px;margin:0 auto;z-index:60;
  display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 16px;}
.toast{background:var(--navy);color:#fff;padding:11px 16px;border-radius:12px;font-size:13px;font-weight:700;
  box-shadow:0 6px 18px rgba(20,38,77,.35);animation:tin .3s ease, tout .3s ease 2.2s forwards;max-width:100%;}
.toast.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);}
.toast.levelup{background:linear-gradient(135deg,#1a9e6c,#2fd08c);}
@keyframes tin{from{opacity:0;transform:translateY(14px) scale(.9);}to{opacity:1;transform:none;}}
@keyframes tout{to{opacity:0;transform:translateY(-8px);}}

/* ===== modal ===== */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:70;display:flex;align-items:center;
  justify-content:center;padding:24px;animation:fade .2s ease;}
.modal{background:#fff;border-radius:20px;padding:22px;max-width:340px;width:100%;text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.35);animation:pop .35s cubic-bezier(.2,1.3,.4,1);}
@keyframes pop{from{opacity:0;transform:scale(.85) translateY(10px);}to{opacity:1;transform:none;}}
.modal h3{font-size:18px;color:var(--navy);margin-bottom:8px;}
.modal p{font-size:14px;color:var(--sub);margin:0 0 16px;}
.modal .big{font-size:52px;margin:6px 0;}
.modal .btns{display:flex;gap:10px;margin-top:6px;}
.modal .btns .btn{flex:1;}

/* ===== gacha flip ===== */
.gacha-stage{perspective:900px;display:flex;justify-content:center;margin:8px 0 18px;}
.flip{width:150px;height:200px;position:relative;transform-style:preserve-3d;
  animation:flip 1.1s cubic-bezier(.4,.1,.2,1) forwards;}
@keyframes flip{0%{transform:rotateY(0);}55%{transform:rotateY(0);}100%{transform:rotateY(180deg);}}
.flip .side{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;
  display:flex;align-items:center;justify-content:center;}
.flip .back{background:linear-gradient(135deg,var(--navy),var(--navy3));border:2px solid var(--gold);
  font-size:44px;color:var(--gold2);}
.flip .front{transform:rotateY(180deg);flex-direction:column;padding:10px;text-align:center;
  border:3px solid var(--n);background:#fff;}
.flip .front.r{border-color:var(--r);}
.flip .front.sr{border-color:var(--sr);box-shadow:0 0 22px rgba(212,175,55,.7);}
.flip .front.ssr{border:none;background:linear-gradient(#fff,#fff) padding-box,
  linear-gradient(135deg,#ff5f6d,#ffc371,#5eead4,#818cf8,#f472b6) border-box;
  box-shadow:0 0 26px rgba(129,140,248,.75);border:3px solid transparent;}
.flip .front .fr{font-size:11px;font-weight:900;color:#fff;background:var(--n);padding:2px 8px;border-radius:6px;}
.flip .front.r .fr{background:var(--r);}
.flip .front.sr .fr{background:var(--sr);}
.flip .front.ssr .fr{background:linear-gradient(135deg,#ff5f6d,#818cf8);}
.flip .front .ft{font-size:13px;font-weight:800;color:var(--navy);margin-top:8px;line-height:1.3;}
.flip .front .fc{font-size:10px;color:var(--sub);margin-top:3px;}
.shine{animation:shine 1.4s ease .9s infinite;}
@keyframes shine{0%,100%{filter:brightness(1);}50%{filter:brightness(1.25);}}

/* ===== error ===== */
.errbox{margin:60px 16px;text-align:center;color:var(--sub);}
.errbox .e{font-size:44px;}

textarea.field:focus,input:focus{outline:none;border-color:var(--navy2);}
.name-input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px;font-size:16px;margin-top:8px;}
.help{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.5;}
.evalpick{display:flex;gap:8px;margin-top:10px;}
.evalpick button{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:12px 0;font-weight:800;background:#fff;color:var(--navy);}
.evalpick button.on{background:var(--gold);border-color:var(--gold);color:var(--navy);}

/* ===== countdown timer ===== */
.timer-wrap{position:sticky;top:56px;z-index:10;background:var(--bg);padding:8px 0 6px;margin-bottom:8px;}
.timer-num{font-size:22px;font-weight:900;color:var(--navy);text-align:center;letter-spacing:.04em;font-variant-numeric:tabular-nums;}
.bar.timer-bar{height:12px;margin-top:6px;}
.bar.timer-bar>span{background:linear-gradient(90deg,var(--ok),#2fd08c);transition:width .5s linear,background .3s;}

/* ===== career badge (選考対策 / 業界マスター) ===== */
.cbadge{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);margin-left:6px;vertical-align:middle;}
.ind-chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;}
.ind-chips::-webkit-scrollbar{display:none;}
.ind-chip{flex:none;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;
  font-size:12px;font-weight:700;color:var(--navy);white-space:nowrap;}
.ind-chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.ind-chip.mastered{border-color:var(--gold);}
.ind-chip.mastered.on{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);border-color:var(--gold);}
.badge-wall{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.ibadge{display:flex;flex-direction:column;align-items:center;gap:2px;width:56px;}
.ibadge .ic{font-size:26px;filter:grayscale(1);opacity:.35;}
.ibadge.on .ic{filter:none;opacity:1;}
.ibadge .nm{font-size:10px;color:var(--sub);font-weight:700;text-align:center;}
.ibadge.on .nm{color:var(--navy);}
.fu-q{background:var(--navy2);color:#fff;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:700;margin-bottom:8px;line-height:1.5;}

/* ===== gacha: recruitment room ===== */
.modal.wide{max-width:420px;}
.gacha-room .muted{margin:0 0 10px;}
.pity-bar{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold2);
  font-weight:800;font-size:12px;padding:8px 12px;border-radius:10px;margin-bottom:12px;
  border:1px solid rgba(212,175,55,.4);}
.gacha-opt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#fff;
  border:1.5px solid var(--line);border-radius:14px;padding:11px 12px;margin-bottom:10px;box-shadow:var(--shadow);
  transition:transform .08s ease;}
.gacha-opt:active{transform:scale(.98);}
.gacha-opt:disabled{opacity:.42;box-shadow:none;}
.gacha-opt .go-ic{font-size:26px;flex:none;width:34px;text-align:center;}
.gacha-opt .go-body{flex:1;min-width:0;display:flex;flex-direction:column;}
.gacha-opt .go-t{font-size:14px;font-weight:800;color:var(--navy);}
.gacha-opt .go-d{font-size:11px;color:var(--sub);line-height:1.35;}
.gacha-opt .go-cost{flex:none;font-size:12px;font-weight:800;color:var(--navy);
  background:var(--gold-soft);border-radius:999px;padding:4px 9px;}
.gacha-opt.head .go-cost{background:linear-gradient(135deg,#f472b6,#818cf8);color:#fff;}

/* aura leak + shake before flip */
.gacha-stage{perspective:900px;display:flex;justify-content:center;position:relative;margin:8px 0 14px;}
.aura{position:absolute;top:50%;left:50%;width:190px;height:190px;transform:translate(-50%,-50%) scale(.5);
  border-radius:50%;filter:blur(20px);opacity:0;z-index:0;animation:auraPulse 1.2s ease forwards;}
.aura.n{background:radial-gradient(circle,#ffffff,transparent 68%);}
.aura.r{background:radial-gradient(circle,#3b82f6,transparent 68%);}
.aura.sr{background:radial-gradient(circle,#f0c650,transparent 68%);}
.aura.ssr{background:conic-gradient(from 0deg,#ff5f6d,#ffc371,#5eead4,#818cf8,#f472b6,#ff5f6d);
  animation:auraPulse 1.2s ease forwards,auraSpin 2.4s linear infinite;}
@keyframes auraPulse{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}
  45%{opacity:.85;transform:translate(-50%,-50%) scale(1);}100%{opacity:.55;transform:translate(-50%,-50%) scale(1.08);}}
@keyframes auraSpin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.flip.fx{position:relative;z-index:1;animation:flipFx 1.35s cubic-bezier(.4,.1,.2,1) forwards;}
@keyframes flipFx{
  0%{transform:rotateY(0) rotate(0);}8%{transform:rotateY(0) rotate(-4deg);}
  16%{transform:rotateY(0) rotate(4deg);}24%{transform:rotateY(0) rotate(-4deg);}
  32%{transform:rotateY(0) rotate(3deg);}44%{transform:rotateY(0) rotate(0);}
  60%{transform:rotateY(0);}100%{transform:rotateY(180deg);}}
.flavor{font-size:13px;font-weight:700;color:var(--navy);margin:2px 0 6px;min-height:18px;
  opacity:0;animation:fvin .5s ease 1s forwards;}
.flavor.ssr{color:#a15ff2;}
@keyframes fvin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* 10-pull grid */
.gacha-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;perspective:800px;margin:6px 0 12px;}
.flip.mini{width:100%;height:auto;aspect-ratio:3/4;animation:flip 1s cubic-bezier(.4,.1,.2,1) both;}
.flip.mini .side{border-radius:9px;}
.flip.mini .back{font-size:22px;border-width:1.5px;}
.flip.mini .front{padding:4px 3px;border-width:2px;}
.flip.mini .front .fr{font-size:8px;padding:1px 5px;border-radius:4px;}
.flip.mini .front .mi-e{font-size:16px;margin-top:3px;}
.flip.mini .front .mi-t{font-size:8px;font-weight:800;color:var(--navy);margin-top:2px;line-height:1.15;
  max-height:22px;overflow:hidden;}
.spotlight{margin:2px 0 4px;font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.03em;}

/* confetti (CSS-only) */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden;}
.confetti i{position:absolute;top:-24px;border-radius:2px;opacity:.92;animation:confall linear forwards;}
@keyframes confall{0%{transform:translateY(-24px) rotate(0);}100%{transform:translateY(106vh) rotate(760deg);}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar" id="topbar">
    <div>
      <div class="tb-title" id="tb-title">経営者への道</div>
      <div class="tb-sub" id="tb-sub">経営スキル特訓</div>
    </div>
    <div class="tb-badge" id="tb-badge">🎫 0</div>
  </div>
  <div id="screen"></div>
</div>
<div class="nav" id="nav"></div>
<div id="toasts"></div>
<div id="modalRoot"></div>

<script src="data/cards.js"></script>
<script src="data/drills.js"></script>
<script src="data/challenges.js"></script>
<script src="data/career.js"></script>
<script>
(function(){
"use strict";

/* =========================================================
   DATA (with guards)
   ========================================================= */
var CARDS   = Array.isArray(window.DATA_CARDS)   ? window.DATA_CARDS   : [];
var DRILLS  = Array.isArray(window.DATA_DRILLS)  ? window.DATA_DRILLS  : [];
var BOSSES  = Array.isArray(window.DATA_BOSSES)  ? window.DATA_BOSSES  : [];
var QUESTS  = Array.isArray(window.DATA_QUESTS)  ? window.DATA_QUESTS  : [];
var BOARDS  = Array.isArray(window.DATA_BOARD)   ? window.DATA_BOARD   : [];
/* ----- career (就活・転職対策) data, guarded ----- */
var CASES   = Array.isArray(window.DATA_CASES)   ? window.DATA_CASES   : [];
var SPI     = Array.isArray(window.DATA_SPI)     ? window.DATA_SPI     : [];
var CQUESTS = Array.isArray(window.DATA_CQUESTS) ? window.DATA_CQUESTS : [];
var DATA_OK = CARDS.length>0 || DRILLS.length>0 || BOSSES.length>0;

/* =========================================================
   CONSTANTS
   ========================================================= */
var DEPTS = [
  {key:'keiri',     name:'経理部',     emo:'💰'},
  {key:'kikaku',    name:'経営企画部', emo:'📈'},
  {key:'marketing', name:'マーケ部',   emo:'📣'},
  {key:'jinji',     name:'人事部',     emo:'👥'},
  {key:'shacho',    name:'社長室',     emo:'🧠'}
];
var DEPT_MAP={}; DEPTS.forEach(function(d){DEPT_MAP[d.key]=d;});
var CAT_TO_DEPT={strategy:'kikaku', ma:'kikaku', marketing:'marketing', org:'jinji', failure:'shacho'};

/* ----- 業界（industry）マスタ：12種 ----- */
var INDUSTRIES=[
  {key:'tech',          name:'テック',       emo:'💻'},
  {key:'retail',        name:'小売',         emo:'🛒'},
  {key:'food',          name:'食品',         emo:'🍔'},
  {key:'manufacturing', name:'製造',         emo:'🏭'},
  {key:'auto',          name:'自動車',       emo:'🚗'},
  {key:'finance',       name:'金融',         emo:'🏦'},
  {key:'entertainment', name:'エンタメ',     emo:'🎬'},
  {key:'fashion',       name:'ファッション', emo:'👗'},
  {key:'logistics',     name:'物流',         emo:'📦'},
  {key:'service',       name:'サービス',     emo:'🛎️'},
  {key:'energy',        name:'エネルギー',   emo:'⚡'},
  {key:'pharma',        name:'製薬',         emo:'💊'}
];
var INDUSTRY_MAP={}; INDUSTRIES.forEach(function(i){INDUSTRY_MAP[i.key]=i;});
function industryName(k){return (INDUSTRY_MAP[k]&&INDUSTRY_MAP[k].name)||'';}
function industryEmo(k){return (INDUSTRY_MAP[k]&&INDUSTRY_MAP[k].emo)||'🏢';}
function industryCards(k){return CARDS.filter(function(c){return c.industry===k;});}

var STAGES=[
  {min:0,     name:'個人事業主',   emo:'🏠'},
  {min:500,   name:'スタートアップ',emo:'🏢'},
  {min:2000,  name:'シード',       emo:'🏬'},
  {min:6000,  name:'シリーズA',    emo:'🏦'},
  {min:15000, name:'上場企業',     emo:'🏙️'},
  {min:40000, name:'大企業',       emo:'🌆'}
];
var RATINGS=[
  {min:30,name:'AAA'},{min:14,name:'AA'},{min:7,name:'A'},
  {min:3,name:'BBB'},{min:1,name:'BB'},{min:0,name:'B'}
];
var RANKS=[
  {name:'経営者', xp:45000, need:function(s){return countBoards(s)>=2;}},
  {name:'役員',   xp:20000, need:function(s){return countBoards(s)>=1;}},
  {name:'部長',   xp:8000,  need:function(s){return s.questsDone.length>=3;}},
  {name:'課長',   xp:3000,  need:function(s){return s.bossWins.length>=3;}},
  {name:'主任',   xp:800,   need:function(s){return true;}},
  {name:'新入社員',xp:0,     need:function(s){return true;}}
];
function countBoards(s){return s.boardsDone.length;}

var RARITY_W={N:60,R:28,SR:10,SSR:2};
var CAT_EMOJI={strategy:'♟️',ma:'🤝',marketing:'📣',org:'👥',failure:'⚠️'};

/* =========================================================
   STATE
   ========================================================= */
var SAVE_KEY='ceoQuestSave';
var S=null;

function defaultState(){
  return {
    version:1,
    companyName:'',
    setupDone:false,
    totalXP:0,
    deptXP:{keiri:0,kikaku:0,marketing:0,jinji:0,shacho:0},
    ownedCards:[],
    tickets:0,
    streak:0,
    lastStudyDate:'',
    bossWins:[],
    questsDone:[],
    boardsDone:[],
    drillHistory:{},          /* {drillId:'YYYY-MM-DD'} last day awarded */
    dailyCardDate:'',         /* last date the daily card quiz was answered */
    dailyCardId:'',           /* the card obtained today */
    dailyDrill:{date:'',count:0,bonus:false},
    firstGachaSR:false,
    gachaPity:0,               /* 天井カウンター：SSR未排出の連続排出枚数 */
    /* ----- 就活・転職対策（v2追加） ----- */
    casesWon:[],              /* クリア済みケース面接ID */
    spiHistory:{},            /* {spiId:'YYYY-MM-DD'} Webテスト設問ごとの最終XP付与日 */
    spiGenreStats:{},         /* {genre:{correct:n,total:n}} 正答率トラッキング */
    dailySpi:{date:'',bonus:false}, /* Webテストセッション完了ボーナス（1日1回） */
    industryBadges:[],        /* 獲得済み業界マスターバッジ */
    createdAt:Date.now()
  };
}
function load(){
  try{
    var raw=localStorage.getItem(SAVE_KEY);
    if(!raw){S=defaultState();return;}
    var p=JSON.parse(raw);
    S=Object.assign(defaultState(),p);
    S.deptXP=Object.assign({keiri:0,kikaku:0,marketing:0,jinji:0,shacho:0},p.deptXP||{});
    S.dailyDrill=Object.assign({date:'',count:0,bonus:false},p.dailyDrill||{});
    /* v2 migration (older saves lack these) */
    S.casesWon=Array.isArray(p.casesWon)?p.casesWon:[];
    S.spiHistory=(p.spiHistory&&typeof p.spiHistory==='object')?p.spiHistory:{};
    S.spiGenreStats=(p.spiGenreStats&&typeof p.spiGenreStats==='object')?p.spiGenreStats:{};
    S.dailySpi=Object.assign({date:'',bonus:false},p.dailySpi||{});
    S.industryBadges=Array.isArray(p.industryBadges)?p.industryBadges:[];
    S.gachaPity=(typeof p.gachaPity==='number'&&p.gachaPity>=0)?p.gachaPity:0;
  }catch(e){S=defaultState();}
}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}}

/* =========================================================
   DATE HELPERS (local time)
   ========================================================= */
function pad(n){return n<10?'0'+n:''+n;}
function dstr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function todayStr(){return dstr(new Date());}
function yesterdayStr(){var d=new Date();d.setDate(d.getDate()-1);return dstr(d);}
function dateSeed(str){var h=0;for(var i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))>>>0;}return h;}

/* =========================================================
   DERIVED
   ========================================================= */
function deptLevel(xp){
  var n=1;
  while(xp>=50*n*(n+1)/2){n++;}
  return n;
}
function deptProgress(xp){
  var lv=deptLevel(xp);
  var prev=(lv===1)?0:50*(lv-1)*lv/2;
  var next=50*lv*(lv+1)/2;
  return {lv:lv,prev:prev,next:next,pct:Math.max(0,Math.min(1,(xp-prev)/(next-prev)))};
}
function stageOf(xp){var s=STAGES[0];for(var i=0;i<STAGES.length;i++){if(xp>=STAGES[i].min)s=STAGES[i];}return s;}
function nextStage(xp){for(var i=0;i<STAGES.length;i++){if(xp<STAGES[i].min)return STAGES[i];}return null;}
function ratingOf(streak){for(var i=0;i<RATINGS.length;i++){if(streak>=RATINGS[i].min)return RATINGS[i].name;}return 'B';}
function rankOf(s){
  for(var i=0;i<RANKS.length;i++){
    var r=RANKS[i];
    if(s.totalXP>=r.xp && r.need(s))return r.name;
  }
  return '新入社員';
}

/* =========================================================
   XP ENGINE
   ========================================================= */
function gainXP(amount, target){
  amount=Math.round(amount);
  if(amount<=0)return;
  var before={};DEPTS.forEach(function(d){before[d.key]=deptLevel(S.deptXP[d.key]);});
  if(target==='distribute'){
    var sh=Math.round(amount*0.55);
    S.deptXP.shacho+=sh;
    var rest=amount-sh, per=Math.floor(rest/5);
    DEPTS.forEach(function(d){S.deptXP[d.key]+=per;});
    S.deptXP.shacho+=rest-per*5;
  }else if(DEPT_MAP[target]){
    S.deptXP[target]+=amount;
  }else{
    S.deptXP.shacho+=amount;
  }
  S.totalXP+=amount;
  DEPTS.forEach(function(d){
    var after=deptLevel(S.deptXP[d.key]);
    if(after>before[d.key])toast(d.emo+' '+d.name+' Lv.'+after+' に昇格！','levelup');
  });
  save();
}
function touchStreak(){
  var t=todayStr();
  if(S.lastStudyDate===t)return;
  if(S.lastStudyDate===yesterdayStr())S.streak+=1;
  else S.streak=1;
  S.lastStudyDate=t;
  save();
}

/* =========================================================
   TOAST / MODAL
   ========================================================= */
function toast(msg,cls){
  var t=document.getElementById('toasts');
  var el=document.createElement('div');
  el.className='toast'+(cls?' '+cls:'');
  el.textContent=msg;
  t.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},2600);
}
function modal(html){
  var root=document.getElementById('modalRoot');
  root.innerHTML='<div class="overlay">'+html+'</div>';
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

/* =========================================================
   ROUTER / UI STATE
   ========================================================= */
var UI={screen:'home', sub:null, data:{}};
function nav(scr){UI.screen=scr;UI.sub=null;UI.data={};render();window.scrollTo(0,0);}
function go(sub,data){UI.sub=sub;UI.data=data||{};render();window.scrollTo(0,0);}

/* ----- countdown timer (deadline-based, survives re-render) ----- */
var TIMER=null;
function clearTimer(){if(TIMER){clearInterval(TIMER);TIMER=null;}}
function fmtClock(sec){sec=Math.max(0,Math.floor(sec));var m=Math.floor(sec/60),s=sec%60;return (m<10?'0'+m:m)+':'+(s<10?'0'+s:s);}
function armTimer(barId,numId,onZero){
  clearTimer();
  var bar=document.getElementById(barId), num=document.getElementById(numId);
  if(!bar||!num||!UI.data.deadline)return;
  var total=UI.data.timerTotal||1;
  function tick(){
    var rem=Math.round((UI.data.deadline-Date.now())/1000);
    if(rem<=0){
      if(!UI.data.over){UI.data.over=true; if(typeof onZero==='function')onZero();}
      num.textContent='時間超過 +'+fmtClock(-rem);
      num.style.color='var(--ng)';
      bar.style.width='0%'; bar.style.background='var(--ng)';
    }else{
      num.textContent=fmtClock(rem);
      bar.style.width=Math.max(0,Math.min(100,rem/total*100))+'%';
    }
  }
  tick();
  TIMER=setInterval(tick,500);
}
function timerBar(){
  return '<div class="timer-wrap"><div class="timer-num" id="csTimerNum">--:--</div>'+
    '<div class="bar timer-bar"><span id="csTimerBar" style="width:100%"></span></div></div>';
}

function render(){
  clearTimer();
  refreshTopbar();
  refreshNav();
  var host=document.getElementById('screen');
  if(!DATA_OK){host.innerHTML=errorView();return;}
  var html='';
  switch(UI.screen){
    case 'home':      html=viewHome(); break;
    case 'daily':     html=viewDaily(); break;
    case 'challenge': html=viewChallenge(); break;
    case 'dex':       html=viewDex(); break;
    case 'settings':  html=viewSettings(); break;
    default:          html=viewHome();
  }
  host.innerHTML='<div class="screen">'+html+'</div>';
  if(typeof UI._after==='function'){var f=UI._after;UI._after=null;f();}
}
function errorView(){
  return '<div class="errbox"><div class="e">📦</div><h3>データ読込エラー</h3>'+
    '<p class="muted">事例・ドリル・挑戦データ（data/*.js）が読み込めませんでした。<br>'+
    'ファイルが揃っているかご確認ください。</p></div>';
}

function refreshTopbar(){
  document.getElementById('tb-title').textContent = S.companyName || '経営者への道';
  document.getElementById('tb-sub').textContent = rankOf(S)+' ・ '+stageOf(S.totalXP).name;
  document.getElementById('tb-badge').textContent = '🎫 '+S.tickets;
}
function refreshNav(){
  var items=[
    {k:'home',i:'🏢',t:'ホーム'},
    {k:'daily',i:'📚',t:'デイリー'},
    {k:'challenge',i:'⚔️',t:'挑戦'},
    {k:'dex',i:'🗂️',t:'図鑑'},
    {k:'settings',i:'⚙️',t:'設定'}
  ];
  document.getElementById('nav').innerHTML=items.map(function(it){
    return '<button class="'+(UI.screen===it.k?'on':'')+'" onclick="APP.nav(\''+it.k+'\')">'+
      '<span class="ni">'+it.i+'</span>'+it.t+'</button>';
  }).join('');
}

/* =========================================================
   HELPERS
   ========================================================= */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rarClass(r){return r==='SSR'?'ssr':r==='SR'?'sr':r==='R'?'r':'';}
function owns(id){return S.ownedCards.indexOf(id)>=0;}

/* =========================================================
   HOME
   ========================================================= */
function viewHome(){
  var st=stageOf(S.totalXP), ns=nextStage(S.totalXP);
  var rank=rankOf(S), rating=ratingOf(S.streak);
  var cardDone = S.dailyCardDate===todayStr();
  var dd=S.dailyDrill;
  var drillDone = dd.date===todayStr() && dd.bonus;
  var drillCount = dd.date===todayStr()?dd.count:0;

  var html='';
  html+='<div class="hero">'+
    '<div class="company-name">'+esc(S.companyName||'（社名未設定）')+'</div>'+
    '<div class="stage-name">'+st.emo+' '+st.name+'</div>'+
    '<div class="building">'+st.emo+'</div>'+
    '<div class="rank-row">'+
      '<span class="chip gold">👔 '+rank+'</span>'+
      '<span class="chip">🔥 '+S.streak+'日</span>'+
      '<span class="chip">格付 '+rating+'</span>'+
    '</div>'+
    '<div class="xp-total">総XP <b>'+S.totalXP.toLocaleString()+'</b>'+
      (ns?' ／ 次のステージ「'+ns.name+'」まで '+(ns.min-S.totalXP).toLocaleString()+'XP':' ／ 最高ステージ達成！')+'</div>'+
  '</div>';

  html+='<div class="stat-grid">'+
    stat('🎫 ガチャチケット', S.tickets+'枚')+
    stat('📇 図鑑', S.ownedCards.length+' / '+CARDS.length)+
    stat('⚔️ ボス撃破', S.bossWins.length+' / '+BOSSES.length)+
    stat('🔬 クエスト', S.questsDone.length+' / '+(QUESTS.length+CQUESTS.length))+
    stat('🎤 ケース面接', S.casesWon.length+' / '+CASES.length)+
    stat('🏅 業界バッジ', S.industryBadges.length+' / '+INDUSTRIES.length)+
  '</div>';

  html+='<div class="card"><h3>🏗️ スキルツリー（部門レベル）</h3>';
  DEPTS.forEach(function(d){
    var p=deptProgress(S.deptXP[d.key]);
    var decor='';for(var i=0;i<Math.min(p.lv,10);i++)decor+=d.emo;
    html+='<div class="dept"><div class="emo">'+d.emo+'</div><div class="body">'+
      '<div class="top"><span>'+d.name+'</span><span class="lv">Lv.'+p.lv+'</span></div>'+
      '<div class="bar"><span style="width:'+(p.pct*100).toFixed(0)+'%"></span></div>'+
      '<div class="decor">'+decor+'</div>'+
    '</div></div>';
  });
  html+='</div>';

  var spiDone = S.dailySpi.date===todayStr() && S.dailySpi.bonus;
  html+='<div class="card"><h3>🎯 今日のミッション</h3><div class="mission">'+
    '<div class="m'+(cardDone?' done':'')+'"><div class="ic">📇</div><div class="t">事例カード</div>'+
      '<div class="s">'+(cardDone?'完了 ✓':'未達成')+'</div></div>'+
    '<div class="m'+(drillDone?' done':'')+'"><div class="ic">📝</div><div class="t">ドリル10問</div>'+
      '<div class="s">'+(drillDone?'完了 ✓':drillCount+' / 10問')+'</div></div>'+
    '<div class="m'+(spiDone?' done':'')+'"><div class="ic">⏱️</div><div class="t">Webテスト</div>'+
      '<div class="s">'+(spiDone?'完了 ✓':'未達成')+'</div></div>'+
  '</div>'+
  '<button class="btn gold" style="margin-top:12px" onclick="APP.nav(\'daily\')">今日の学習へ →</button>'+
  '</div>';

  if(!S.setupDone){
    UI._after=function(){promptCompanyName(true);};
  }
  return html;
}
function stat(k,v){return '<div class="stat"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';}

function promptCompanyName(first){
  modal('<div class="modal"><div class="big">🏢</div>'+
    '<h3>会社を設立しよう</h3>'+
    '<p>あなたの仮想会社の名前を決めてください。</p>'+
    '<input class="name-input" id="cn" maxlength="20" placeholder="例：ハル・ホールディングス" value="'+esc(S.companyName)+'">'+
    '<div class="btns"><button class="btn gold" onclick="APP.saveName()">設立する</button></div>'+
    '</div>');
  setTimeout(function(){var el=document.getElementById('cn');if(el)el.focus();},100);
}
function saveName(){
  var el=document.getElementById('cn');
  var v=(el?el.value:'').trim();
  if(!v){toast('社名を入力してください');return;}
  S.companyName=v; S.setupDone=true; save();
  closeModal(); toast('🏢 '+v+' 設立！','gold'); render();
}

/* =========================================================
   DAILY
   ========================================================= */
function viewDaily(){
  if(UI.sub==='card') return viewDailyCard();
  if(UI.sub==='drillPick') return viewDrillPick();
  if(UI.sub==='drill') return viewDrillSession();
  if(UI.sub==='spi') return viewSpiSession();

  var cardDone=S.dailyCardDate===todayStr();
  var dd=S.dailyDrill; var cnt=dd.date===todayStr()?dd.count:0; var bonus=dd.date===todayStr()&&dd.bonus;
  var html='<h2 style="font-size:20px;color:var(--navy);margin-bottom:14px;">📚 デイリー学習</h2>';

  html+='<button class="lrow" onclick="APP.go(\'card\')">'+

function pickDailyCard(){

  pool.sort(function(a,b){return String(a.id)<String(b.id)?-1:1;});
  var idx=dateSeed(todayStr())%pool.length;

/* ----- drill ----- */
function startDrill(dept){
  var pool=DRILLS.filter(function(x){return x.dept===dept;});
  if(pool.length===0){toast('この部門のドリルがありません');return;}
  var deptLv=deptLevel(S.deptXP[dept]);
  var band=Math.min(3,Math.max(1,Math.ceil(deptLv/2)));
  var scored=pool.map(function(q){
    return {q:q, w:Math.abs((q.level||1)-band)+Math.random()};
  }).sort(function(a,b){return a.w-b.w;});
  var picked=scored.slice(0,Math.min(10,scored.length)).map(function(x){return x.q;});
  for(var i=picked.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=picked[i];picked[i]=picked[j];picked[j]=t;}
  UI.sub='drill';
  UI.data={dept:dept, list:picked, idx:0, picked:null, correct:0};
  render();window.scrollTo(0,0);
}

  html+='<p style="font-weight:700;font-size:15px">'+esc(q.q)+'</p>';
  html+='<div class="choices">';
  (q.choices||[]).forEach(function(ch,i){

    }

      '<span class="lab">'+String.fromCharCode(65+i)+'</span><span>'+esc(ch)+'</span></button>';

  html+='</div>';

function judgeBoss(id){
  var b=BOSSES.filter(function(x){return x.id===id;})[0]; if(!b)return;
  var el=document.getElementById('bans');
  if(!el||el.value===''){toast('数値を入力してください');return;}
  var val=parseFloat(el.value);
  var memo=[];(b.steps||[]).forEach(function(s,i){var m=document.getElementById('bmemo'+i);memo[i]=m?m.value:'';});
  var win=false;
  if(b.model&&b.model.range){win = val>=b.model.range[0] && val<=b.model.range[1];}
  else{win=true;}
  UI.data={id:id, result:el.value, win:win, memo:memo};
  var first=S.bossWins.indexOf(id)<0;
  if(win){
    touchStreak();
    if(first){
      S.bossWins.push(id);
      S.tickets+=2;
      gainXP(b.xp||100,'distribute');
      save();
      showBossWin(b, first);
    }else{toast('🏆 再撃破！','gold');}
  }else{
    toast('レンジ外。模範モデルを確認して再挑戦');
  }
  save();render();
}

    '<h3>ボス撃破！</h3>'+

/* =========================================================
   WEB TEST（SPI / Webテスト）
   ========================================================= */
function spiGenreName(g){return g||'その他';}
function spiGenreAccuracy(g){var st=S.spiGenreStats[g];if(!st||!st.total)return 0.5;return st.correct/st.total;}
function spiStartQuestion(){
  var d=UI.data; var q=d.list[d.idx];
  d.picked=null; d.over=false;
  var tl=(q&&q.timeLimit)||60;
  d.timerTotal=tl;
  d.deadline=Date.now()+tl*1000;
}
function startSpi(){
  if(SPI.length===0){toast('Webテストのデータがありません');return;}
  var scored=SPI.map(function(q){return {q:q, w:spiGenreAccuracy(q.genre)+Math.random()*0.7};})
    .sort(function(a,b){return a.w-b.w;});
  var picked=scored.slice(0,Math.min(10,scored.length)).map(function(x){return x.q;});
  for(var i=picked.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=picked[i];picked[i]=picked[j];picked[j]=t;}
  UI.sub='spi';
  UI.data={list:picked, idx:0, picked:null, correct:0, genreRes:{}};
  spiStartQuestion();
  render();window.scrollTo(0,0);
}
function viewSpiSession(){
  var d=UI.data;
  if(!d.list||!d.list.length)return backBtn('daily')+'<p class="muted">問題がありません。</p>';
  var q=d.list[d.idx];
  var html=backBtn('daily');
  html+='<div class="qmeta"><span>⏱️ Webテスト</span><span>正解 '+d.correct+'</span></div>';
  html+='<div class="dots" style="margin-bottom:10px">';
  for(var i=0;i<d.list.length;i++){html+='<i class="'+(i<d.idx?'on':i===d.idx?'now':'')+'"></i>';}
  html+='</div>';
  if(d.picked==null)html+=timerBar();
  html+='<div class="card"><div class="muted" style="font-size:11px;margin-bottom:4px">第'+(d.idx+1)+'問 ・ '+esc(spiGenreName(q.genre))+' ・ Lv.'+(q.level||1)+' ・ +'+(10*(q.level||1))+'XP</div>';
  html+='<p style="font-weight:700;font-size:15px">'+esc(q.q)+'</p>';
  html+='<div class="choices">';
  (q.choices||[]).forEach(function(ch,i){
    var cls='choice';
    if(d.picked!=null){
      if(i===q.answer)cls+=' correct';
      else if(i===d.picked)cls+=' wrong';
      else cls+=' dim';
    }
    html+='<button class="'+cls+'"'+(d.picked!=null?' disabled':'')+' onclick="APP.answerSpi('+i+')">'+
      '<span class="lab">'+String.fromCharCode(65+i)+'</span><span>'+esc(ch)+'</span></button>';
  });
  html+='</div>';
  if(d.picked!=null){
    var ok=d.picked===q.answer;
    var to=d.picked===-1;
    html+='<div class="explain '+(ok?'ok':'ng')+'"><b>'+(ok?'正解！':(to?'時間切れ … 不正解':'不正解'))+'</b><br>'+esc(q.explanation||'')+'</div>';
    var last=d.idx>=d.list.length-1;
    html+='<button class="btn'+(last?' gold':'')+'" style="margin-top:12px" onclick="APP.nextSpi()">'+(last?'結果を見る':'次の問題 →')+'</button>';
  }
  html+='</div>';
  if(d.picked==null)UI._after=function(){armTimer('csTimerBar','csTimerNum',function(){APP.spiTimeout();});};
  return html;
}
function spiRecord(q,correct){
  var d=UI.data; var g=q.genre||'other';
  if(!d.genreRes[g])d.genreRes[g]={correct:0,total:0};
  d.genreRes[g].total++; if(correct)d.genreRes[g].correct++;
  if(!S.spiGenreStats[g])S.spiGenreStats[g]={correct:0,total:0};
  S.spiGenreStats[g].total++; if(correct)S.spiGenreStats[g].correct++;
}
function answerSpi(i){
  var d=UI.data; if(d.picked!=null)return;
  clearTimer(); touchStreak();
  var q=d.list[d.idx];
  d.picked=i;
  var correct=(i===q.answer);
  spiRecord(q,correct);
  if(correct){
    d.correct++;
    if(S.spiHistory[q.id]!==todayStr()){
      S.spiHistory[q.id]=todayStr();
      gainXP(10*(q.level||1),'shacho');
      toast('+'+(10*(q.level||1))+'XP','gold');
    }else{toast('正解（本日XP獲得済）');}
  }
  save();render();
}
function spiTimeout(){
  var d=UI.data; if(d.picked!=null)return;
  clearTimer(); touchStreak();
  var q=d.list[d.idx];
  d.picked=-1;
  spiRecord(q,false);
  toast('時間切れ');
  save();render();
}
function nextSpi(){
  var d=UI.data;
  if(d.idx>=d.list.length-1){
    var bonusGiven=false;
    if(!(S.dailySpi.date===todayStr() && S.dailySpi.bonus)){
      S.dailySpi={date:todayStr(),bonus:true};
      S.tickets+=1;
      gainXP(50,'shacho');
      bonusGiven=true;
    }
    save();
    UI.sub=null;
    render();
    showSpiResult(d,bonusGiven);
  }else{

/* ----- gacha config ----- */
var CEILING=20;                        /* 累計排出この枚数でSSR未排出なら次は確定 */
var RARITY_ORDER=['SSR','SR','R','N']; /* 高→低（繰り下げ用） */
var RARITY_RANK={SSR:4,SR:3,R:2,N:1};
var FLAVORS={
  N:['堅実な人材です。','コツコツ型の実務家。','現場を支える縁の下の力持ち。','まずは基礎から。安定の一手。'],
  R:['見どころのある若手だ。','伸びしろ十分の有望株。','ひと味違うセンスを感じる。','将来のリーダー候補かも。'],
  SR:['幹部候補の逸材！','各社が奪い合う実力者。','役員クラスの手腕を持つ。','面接官も思わず唸った。'],
  SSR:['伝説の経営者が入社を志願してきた…！','業界を揺るがすカリスマ、電撃入社！','歴史を動かす一手。役員会が騒然！','この採用、後世に語り継がれる。']
};
function pickFlavor(r){var a=FLAVORS[r]||FLAVORS.N;return a[Math.floor(Math.random()*a.length)];}

/* 現在の未所持プール（batch内で引いたidは drawnIds で除外） */
function gachaAvailable(drawnIds){
  return CARDS.filter(function(c){return !owns(c.id) && drawnIds.indexOf(c.id)<0;});
}
/* 1枚抽選。opts:{forceRarity,minRarity,pickup} 未所持がなければ null */
function drawCard(drawnIds, opts){
  opts=opts||{};
  var avail=gachaAvailable(drawnIds);
  if(avail.length===0)return null;
  var byR={}; avail.forEach(function(c){(byR[c.rarity]=byR[c.rarity]||[]).push(c);});
  var candidates=avail;
  if(opts.forceRarity){
    /* 指定レアから繰り下げて、在庫のある最上位レアを確定 */
    var si=RARITY_ORDER.indexOf(opts.forceRarity), cr=null;
    for(var a=si;a<RARITY_ORDER.length;a++){if(byR[RARITY_ORDER[a]]&&byR[RARITY_ORDER[a]].length){cr=RARITY_ORDER[a];break;}}
    if(cr)candidates=byR[cr];
  }else if(opts.minRarity){
    /* minRarity 以上の在庫があればそこから */
    var mi=RARITY_ORDER.indexOf(opts.minRarity), pool2=[];
    for(var b=0;b<=mi;b++){if(byR[RARITY_ORDER[b]])pool2=pool2.concat(byR[RARITY_ORDER[b]]);}
    if(pool2.length)candidates=pool2;
  }
  /* per-card weight（レア加重を維持しつつピックアップ業界を3倍） */
  var totalW=0, weights=candidates.map(function(c){
    var w=(RARITY_W[c.rarity]||1)/byR[c.rarity].length;
    if(opts.pickup && c.industry===opts.pickup)w*=3;
    totalW+=w; return w;
  });
  var roll=Math.random()*totalW, pick=candidates[0];
  for(var k=0;k<candidates.length;k++){if(roll<weights[k]){pick=candidates[k];break;}roll-=weights[k];}
  return pick;
}
/* countを引く。opts:{pickup,guaranteeRplus}。天井はここで消費・更新 */
function drawBatch(count, opts){
  opts=opts||{};
  var drawnIds=[], results=[];
  for(var i=0;i<count;i++){
    var isLast=(i===count-1), dopts={pickup:opts.pickup};
    var forcedSSR = S.gachaPity>=CEILING;
    if(forcedSSR)dopts.forceRarity='SSR';
    else if(opts.guaranteeRplus && isLast){
      var hasR=results.some(function(r){return RARITY_RANK[r.rarity]>=RARITY_RANK.R;});
      if(!hasR)dopts.minRarity='R';
    }
    var card=drawCard(drawnIds,dopts);
    if(!card)break;
    drawnIds.push(card.id);
    results.push({card:card,rarity:card.rarity});
    if(card.rarity==='SSR')S.gachaPity=0; else S.gachaPity++;
  }
  return results;
}
/* 引いた結果を所持へ反映＋バッジ判定＋保存 */
function commitDraws(results){
  results.forEach(function(r){if(!owns(r.card.id))S.ownedCards.push(r.card.id);});
  if(results.some(function(r){return r.rarity==='SR'||r.rarity==='SSR';}) && !S.firstGachaSR)S.firstGachaSR=true;
  save();
  checkIndustryBadges();
}
function bestOf(results){
  var b=results[0];
  results.forEach(function(r){if(RARITY_RANK[r.rarity]>RARITY_RANK[b.rarity])b=r;});
  return b;
}

    '<button class="btn sm ghost" style="margin-top:8px" onclick="APP.copyExport()">クリップボードにコピー</button></div>';

  html+='<div class="card"><h3>📥 データインポート</h3>'+
    '<p class="help">エクスポートしたJSON文字列を貼り付けて復元します（現在のデータは上書きされます）。</p>'+
    '<textarea class="field" id="impbox" style="min-height:90px;font-size:11px" placeholder="ここにJSONを貼り付け"></textarea>'+
    '<button class="btn sm" style="margin-top:8px" onclick="APP.doImport()">インポート実行</button></div>';

  html+='<div class="card"><h3>⚠️ データリセット</h3>'+
    '<p class="help">すべての進捗（XP・カード・実績）を削除します。この操作は取り消せません。</p>'+
    '<button class="btn sm danger" onclick="APP.resetConfirm()">リセットする</button></div>';

  html+='<p class="muted" style="text-align:center;font-size:11px;margin:16px 0 8px">経営者への道 ・ v2.0<br>データ: カード'+CARDS.length+' / ドリル'+DRILLS.length+' / ボス'+BOSSES.length+' / クエスト'+(QUESTS.length+CQUESTS.length)+' / 取締役会'+BOARDS.length+'<br>就活対策: ケース'+CASES.length+' / Webテスト'+SPI.length+' / 志望企業クエスト'+CQUESTS.length+'</p>';
  return html;
}
function updateName(){
  var el=document.getElementById('setname');var v=(el?el.value:'').trim();
  if(!v){toast('社名を入力してください');return;}
  S.companyName=v;S.setupDone=true;save();toast('社名を変更しました','gold');render();
}
function copyExport(){
  var txt=JSON.stringify(S);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){toast('コピーしました','gold');},function(){toast('コピーに失敗');});
  }else{toast('テキストを長押しで選択してください');}
}
function doImport(){
  var el=document.getElementById('impbox');var v=(el?el.value:'').trim();
  if(!v){toast('JSONを貼り付けてください');return;}
  try{
    var p=JSON.parse(v);
    if(typeof p!=='object'||p==null)throw 0;
    S=Object.assign(defaultState(),p);
    S.deptXP=Object.assign({keiri:0,kikaku:0,marketing:0,jinji:0,shacho:0},p.deptXP||{});
    S.dailyDrill=Object.assign({date:'',count:0,bonus:false},p.dailyDrill||{});
    S.casesWon=Array.isArray(p.casesWon)?p.casesWon:[];
    S.spiHistory=(p.spiHistory&&typeof p.spiHistory==='object')?p.spiHistory:{};
    S.spiGenreStats=(p.spiGenreStats&&typeof p.spiGenreStats==='object')?p.spiGenreStats:{};
    S.dailySpi=Object.assign({date:'',bonus:false},p.dailySpi||{});
    S.industryBadges=Array.isArray(p.industryBadges)?p.industryBadges:[];
    S.gachaPity=(typeof p.gachaPity==='number'&&p.gachaPity>=0)?p.gachaPity:0;
    save();toast('インポート完了','gold');nav('home');
  }catch(e){toast('JSONの形式が正しくありません');}
}
function resetConfirm(){
  modal('<div class="modal"><div class="big">⚠️</div><h3>本当にリセットしますか？</h3>'+
    '<p>すべての進捗が削除されます。</p>'+
    '<div class="btns"><button class="btn ghost" onclick="APP.closeModal()">やめる</button>'+
    '<button class="btn danger" onclick="APP.resetConfirm2()">次へ</button></div></div>');
}
function resetConfirm2(){
  modal('<div class="modal"><div class="big">🛑</div><h3>最終確認</h3>'+
    '<p>この操作は取り消せません。<br>本当に削除してよろしいですか？</p>'+
    '<div class="btns"><button class="btn ghost" onclick="APP.closeModal()">キャンセル</button>'+
    '<button class="btn danger" onclick="APP.doReset()">削除する</button></div></div>');
}
function doReset(){
  try{localStorage.removeItem(SAVE_KEY);}catch(e){}
  S=defaultState();save();closeModal();toast('リセットしました');nav('home');
}

   COMMON UI
   ========================================================= */
function backBtn(scr){return '<button class="back" onclick="APP.go(null)">‹ 戻る</button>';}
function backBtn2(scr){return '<button class="back" onclick="APP.go(null)">‹ 図鑑に戻る</button>';}

/* =========================================================

   ========================================================= */
window.APP={
  nav:nav, go:go, closeModal:closeModal,
  saveName:saveName,
  answerCard:answerCard, claimCard:claimCard,
  startDrill:startDrill, answerDrill:answerDrill, nextDrill:nextDrill,
  judgeBoss:judgeBoss,
  toggleCheck:toggleCheck, completeQuest:completeQuest,
  submitBoard:submitBoard, setEval:setEval, completeBoard:completeBoard,
  openGacha:openGacha, dexFilter:dexFilter,
  gachaSingle:gachaSingle, gachaMulti:gachaMulti,
  gachaHeadMenu:gachaHeadMenu, gachaHead:gachaHead,
  /* ケース面接 */
  casePhase:casePhase, caseToAnswer:caseToAnswer, caseSubmit:caseSubmit,
  caseNextFollowup:caseNextFollowup, setCaseEval:setCaseEval, caseWin:caseWin,
  /* Webテスト */
  startSpi:startSpi, answerSpi:answerSpi, spiTimeout:spiTimeout, nextSpi:nextSpi,
  updateName:updateName, copyExport:copyExport, doImport:doImport,
  resetConfirm:resetConfirm, resetConfirm2:resetConfirm2, doReset:doReset
};
/* alias go(null) helper */
var _go=go;
window.APP.go=function(sub,data){ if(sub===null){UI.sub=null;UI.data={};render();window.scrollTo(0,0);} else _go(sub,data); };

   BOOT
   ========================================================= */
load();
render();
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});
}
})();
</script>
